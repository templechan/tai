on:
    push:
        branches:
            - main

# 只有3步：拉代码 → 配置SSH → 连服务器部署，完事！
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            # 1. 只需要把代码拉下来，为了读取 deploy.sh 脚本
            - name: Checkout code
              uses: actions/checkout@v6

            # 2. 配置SSH密钥（连接你的服务器）
            - name: Install SSH key
              uses: webfactory/ssh-agent@v0.9.1
              with:
                  ssh-private-key: ${{ secrets.TAI_SSH_PRIVATE_KEY }}

            # 3. 信任服务器IP
            - name: Add known hosts
              run: ssh-keyscan ${{ secrets.TAI_SERVER_IP }} > ~/.ssh/known_hosts

            # 4. 直接连接服务器，执行部署！
            # 全程不在GitHub装任何软件，所有环境都在服务器上
            - name: Deploy to server
              env:
                  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
                  POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
                  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
                  DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
                  QIANWEN_API_KEY: ${{ secrets.QIANWEN_API_KEY }}
              run: |
                  ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 ${{ secrets.TAI_USER }}@${{ secrets.TAI_SERVER_IP }} \
                  "export POSTGRES_USER='$POSTGRES_USER' \
                  export POSTGRES_PASSWORD='$POSTGRES_PASSWORD' \
                  export POSTGRES_DB='$POSTGRES_DB' \
                  export POSTGRES_URL='$POSTGRES_URL' \
                  export DEEPSEEK_API_KEY='$DEEPSEEK_API_KEY' \
                  export DOUBAO_API_KEY='$DOUBAO_API_KEY' \
                  export QIANWEN_API_KEY='$QIANWEN_API_KEY' \
                  && bash -s" < ./deploy.sh
