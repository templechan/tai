version: "3.8"

services:
    tai:
        # 等价于 docker build -t tai . （自动构建当前目录的Dockerfile）
        build: .
        # 容器名称
        container_name: tai
        # 开机/崩溃自动重启
        restart: always
        # 加载环境变量
        env_file: .env
        # 等待数据库启动后再启动应用
        depends_on:
            - db
        # 加入Docker内部网络，互通
        networks:
            - app-network
        # 端口映射 主机91 → 容器80
        ports:
            - "91:80"
    # ======================
    # PostgreSQL + pgvector 数据库（自带插件）
    # ======================
    db:
        # 官方镜像，内置 pgvector 插件，开箱即用
        image: ankane/pgvector:latest
        container_name: nextbff-ai-assistant-postgres
        restart: always
        # 加载环境变量
        env_file: .env
        # 数据库持久化（关键：删除容器数据不丢失）
        volumes:
            - postgres_data:/var/lib/postgresql/data
        # 可选：暴露端口给本地数据库工具连接（调试用）
        # ports:
        #   - "5432:5432"
        networks:
            - app-network
# Docker 内部网络（应用和数据库互通）
networks:
    app-network:
        driver: bridge
# 数据库持久化卷
volumes:
    postgres_data:
