name: Deploy to Server

on:
    push:
        branches:
            - main

# 强制使用 Node.js 24，消除所有警告
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6 # 升级到最新版，修复 Node20 警告

            - name: 启动服务（传递环境变量）
              env:
                  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
                  POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
                  POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
                  POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}
                  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
                  DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
                  QIANWEN_API_KEY: ${{ secrets.QIANWEN_API_KEY }}
            - name: Install SSH key
              uses: webfactory/ssh-agent@v0.9.1 # 升级到最新版，未明确支持 Node24‌
              with:
                  ssh-private-key: ${{ secrets.TAI_SSH_PRIVATE_KEY }}

            - name: Add known hosts
              run: ssh-keyscan ${{ secrets.TAI_SERVER_IP }} > ~/.ssh/known_hosts

            - name: Deploy to server
              run: ssh -o StrictHostKeyChecking=no ${{ secrets.TAI_USER }}@${{ secrets.TAI_SERVER_IP }} 'bash -s' < ./deploy.sh
